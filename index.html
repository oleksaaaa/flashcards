<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz App</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
  th { background: #d32f2f; color: #fff; }
  tr:nth-child(even) { background: #fafafa; }

  #userBar { position: absolute; top: 10px; right: 20px; }
  #userBar button { margin-left: 8px; }

  .tabs { display: flex; gap: 4px; margin: 50px 0 20px; border-bottom: 2px solid #ccc; }
  .tab { padding: 10px 20px; cursor: pointer; background: #f0f0f0; border: 1px solid #ccc; border-bottom: none; border-radius: 6px 6px 0 0; }
  .tab.active { background: #fff; font-weight: bold; border-bottom: 2px solid #fff; margin-bottom: -2px; }
  .tabContent { display: none; }
  .tabContent.active { display: block; }

  /* Translate tab */
  #translateBox { display: flex; flex-direction: column; gap: 12px; }
  #enInput, #ukInput { width: 100%; height: 120px; font-size: 18px; padding: 8px; box-sizing: border-box; }

  /* Quizzes tab */
  .quizItem { display: flex; align-items: center; gap: 10px; padding: 8px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 6px; }
  .quizItem .icon { font-size: 24px; }
  .quizItem .name { flex: 1; }

  /* Quiz mode overlay */
  #quizOverlay {
    display: none; position: fixed; inset: 0; background: #fff;
    align-items: center; justify-content: center; flex-direction: column;
    cursor: pointer; z-index: 1000; text-align: center;
  }
  #quizWord { font-size: 64px; font-weight: bold; }
  #quizTranslation { font-size: 36px; color: #d32f2f; margin-top: 20px; }
  #quizClose { position: absolute; top: 20px; right: 30px; font-size: 28px; cursor: pointer; }
  #quizProgress { position: absolute; top: 20px; left: 30px; font-size: 18px; color: #888; }
</style>
</head>
<body>
  <div id="userBar" style="display:none">
    Logged in as <span id="userName"></span>
    <button onclick="logout()">Log out</button>
  </div>

  <div id="loginScreen">
    <h1>Please sign in with Google</h1>
    <div id="g_id_signin"></div>
  </div>

  <div id="appContent" style="display:none">

    <div class="tabs">
      <div class="tab active" data-tab="translate" onclick="showTab('translate')">Translate</div>
      <div class="tab" data-tab="quizzes" onclick="showTab('quizzes')">Quizzes</div>
      <div class="tab" data-tab="settings" onclick="showTab('settings')">Settings</div>
    </div>

    <!-- Translate tab -->
    <div class="tabContent active" id="tab-translate">
      <div id="translateBox">
        <div>
          <h3>English</h3>
          <textarea id="enInput" placeholder="Enter a word..."></textarea>
        </div>
        <div>
          <h3>Ukrainian</h3>
          <textarea id="ukInput" placeholder="Translation..."></textarea>
        </div>
      </div>
      <button id="addToQuizBtn" style="margin-top:15px; padding:8px 16px;">Add to Quiz</button>
      <div id="addedMsg" style="color:green; margin-top:8px; display:none;">Added!</div>
    </div>

    <!-- Quizzes tab -->
    <div class="tabContent" id="tab-quizzes">
      <button onclick="addQuiz()" style="padding:8px 16px;">Add new Quiz</button>
      <button onclick="startQuiz()" style="padding:8px 16px; margin-left:10px;">Start Quiz</button>
      <button onclick="deleteSelectedQuizzes()" style="padding:8px 16px; margin-left:10px;">Delete Quiz</button>
      <div id="quizList" style="margin-top:15px;"></div>
    </div>

    <!-- Settings tab -->
    <div class="tabContent" id="tab-settings">
      <h3>Settings</h3>
      <label><input type="checkbox" id="shuffleSetting"> Shuffle words in quiz</label><br><br>
      <label><input type="checkbox" id="loopSetting"> Loop quiz (restart when finished)</label>
    </div>

  </div>

  <!-- Quiz mode overlay -->
  <div id="quizOverlay">
    <div id="quizClose" onclick="closeQuiz(event)">&times;</div>
    <div id="quizProgress"></div>
    <div id="quizWord"></div>
    <div id="quizTranslation" style="display:none"></div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    const GOOGLE_CLIENT_ID = '995399885896-7ta98tasa45hi3nfmshvkijsbapnsj77.apps.googleusercontent.com';
    let loggedInUser = null;

    function handleCredentialResponse(response) {
      const payload = JSON.parse(atob(response.credential.split('.')[1]));
      loggedInUser = payload.name || payload.email;
      localStorage.setItem('loggedInUser', loggedInUser);
      showApp();
    }

    function showApp() {
      document.getElementById('userName').textContent = loggedInUser;
      document.getElementById('userBar').style.display = 'block';
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appContent').style.display = 'block';
      renderQuizList();
    }

    function logout() {
      loggedInUser = null;
      localStorage.removeItem('loggedInUser');
      google.accounts.id.disableAutoSelect();
      document.getElementById('userBar').style.display = 'none';
      document.getElementById('appContent').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'block';
    }

    window.onload = function () {
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleCredentialResponse
      });
      google.accounts.id.renderButton(
        document.getElementById('g_id_signin'),
        { theme: 'outline', size: 'large' }
      );

      const savedUser = localStorage.getItem('loggedInUser');
      if (savedUser) {
        loggedInUser = savedUser;
        showApp();
      }

      document.getElementById('shuffleSetting').checked = localStorage.getItem('quizShuffle') !== 'false';
      document.getElementById('loopSetting').checked = localStorage.getItem('quizLoop') === 'true';
      document.getElementById('shuffleSetting').onchange = e => localStorage.setItem('quizShuffle', e.target.checked);
      document.getElementById('loopSetting').onchange = e => localStorage.setItem('quizLoop', e.target.checked);
    };

    // ---------- Tabs ----------
    function showTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
      document.querySelectorAll('.tabContent').forEach(c => c.classList.toggle('active', c.id === 'tab-' + name));
    }

    // ---------- Translate ----------
    let translateTimer = null;
    document.addEventListener('input', e => {
      if (e.target.id !== 'enInput') return;
      clearTimeout(translateTimer);
      const text = e.target.value.trim();
      if (!text) { document.getElementById('ukInput').value = ''; return; }
      translateTimer = setTimeout(() => translateText(text), 400);
    });

    async function translateText(text) {
      try {
        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|uk`);
        const data = await res.json();
        document.getElementById('ukInput').value = data.responseData.translatedText || '';
      } catch (e) {
        console.error('Translation failed', e);
      }
    }

    document.getElementById('addToQuizBtn').addEventListener('click', () => {
      const en = document.getElementById('enInput').value.trim();
      const uk = document.getElementById('ukInput').value.trim();
      if (!en || !uk) return;

      const words = JSON.parse(localStorage.getItem('myWords') || '[]');
      words.push({ en, uk });
      localStorage.setItem('myWords', JSON.stringify(words));

      const msg = document.getElementById('addedMsg');
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 1500);

      renderQuizList();
    });

    // ---------- Quizzes ----------
    function getQuizzes() {
      return JSON.parse(localStorage.getItem('quizzes') || '[]');
    }
    function saveQuizzes(list) {
      localStorage.setItem('quizzes', JSON.stringify(list));
    }

    function renderQuizList() {
      const container = document.getElementById('quizList');
      container.innerHTML = '';

      const myWords = JSON.parse(localStorage.getItem('myWords') || '[]');
      const builtIn = {
        id: 'my-words', type: 'words', name: `My Words (${myWords.length})`, icon: '📝'
      };

      const all = [builtIn, ...getQuizzes()];
      all.forEach(q => {
        const div = document.createElement('div');
        div.className = 'quizItem';
        const label = q.id === 'my-words' ? q.name
          : q.type === 'folder' ? `${q.name} (${q.count ?? 0} spreadsheets)`
          : `${q.name} (${q.count ?? 0})`;
        div.innerHTML = `
          <input type="checkbox" data-id="${q.id}">
          <span class="icon">${q.icon}</span>
          <span class="name">${label}</span>
        `;
        container.appendChild(div);
      });
    }

    function deleteSelectedQuizzes() {
      const checked = [...document.querySelectorAll('#quizList input[type=checkbox]:checked')]
        .map(cb => cb.dataset.id)
        .filter(id => id !== 'my-words');
      if (checked.length === 0) { alert('Select at least one quiz to delete'); return; }
      if (!confirm(`Delete ${checked.length} quiz(es)?`)) return;
      saveQuizzes(getQuizzes().filter(q => !checked.includes(q.id)));
      renderQuizList();
    }

    const QUIZ_ICONS = { sheet: '📄', multisheet: '📑', folder: '📁' };

    // ---------- Google API access token (for reading sheet/folder titles & data) ----------
    let accessToken = null;
    let tokenClient = null;

    function ensureAccessToken() {
      return new Promise((resolve, reject) => {
        if (accessToken) return resolve(accessToken);
        if (!tokenClient) {
          tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/spreadsheets.readonly https://www.googleapis.com/auth/drive.readonly',
            callback: (resp) => {
              if (resp.error) { reject(resp); return; }
              accessToken = resp.access_token;
              resolve(accessToken);
            }
          });
        }
        tokenClient.requestAccessToken();
      });
    }

    async function addQuiz() {
      const url = prompt('Paste the Google Sheets / Drive folder URL:');
      if (!url) return;

      const folderMatch = url.match(/folders\/([a-zA-Z0-9_-]+)/);
      const sheetMatch = url.match(/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);

      let quiz;
      try {
        const token = await ensureAccessToken();
        if (folderMatch) {
          quiz = await buildFolderQuiz(folderMatch[1], token);
        } else if (sheetMatch) {
          const gidMatch = url.match(/gid=(\d+)/);
          quiz = await buildSheetQuiz(sheetMatch[1], gidMatch ? gidMatch[1] : '0', token);
        } else {
          alert('Could not recognize this as a Google Sheets or Drive folder URL.');
          return;
        }
      } catch (e) {
        console.error('Failed to add quiz', e);
        alert('Could not access this Google Sheets / Drive item: ' + (e && (e.error || e.message || JSON.stringify(e))));
        return;
      }

      const quizzes = getQuizzes();
      quizzes.push(quiz);
      saveQuizzes(quizzes);
      renderQuizList();
    }

    async function buildSheetQuiz(sheetId, gid, token) {
      const meta = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}?fields=properties.title,sheets.properties.title`, {
        headers: { Authorization: `Bearer ${token}` }
      }).then(r => r.json());

      if (meta.error) throw new Error(`Sheets API error ${meta.error.code}: ${meta.error.message}`);

      const name = meta.properties.title;
      const tabs = meta.sheets.map(s => s.properties.title);
      const type = tabs.length > 1 ? 'multisheet' : 'sheet';

      let words = [];
      for (const tab of tabs) {
        words = words.concat(await fetchSheetTabWords(sheetId, tab, token));
      }

      return { id: 'q_' + Date.now(), type, icon: QUIZ_ICONS[type], name, count: words.length, sheetId, folderId: null, tabs };
    }

    async function buildFolderQuiz(folderId, token) {
      const folderMeta = await fetch(`https://www.googleapis.com/drive/v3/files/${folderId}?fields=name`, {
        headers: { Authorization: `Bearer ${token}` }
      }).then(r => r.json());
      if (folderMeta.error) throw new Error(`Drive API error ${folderMeta.error.code}: ${folderMeta.error.message}`);
      const name = folderMeta.name;

      const listing = await fetch(`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+mimeType='application/vnd.google-apps.spreadsheet'&fields=files(id,name)`, {
        headers: { Authorization: `Bearer ${token}` }
      }).then(r => r.json());
      if (listing.error) throw new Error(`Drive API error ${listing.error.code}: ${listing.error.message}`);

      const sheetIds = (listing.files || []).map(f => f.id);
      const sheetCount = sheetIds.length;

      return { id: 'q_' + Date.now(), type: 'folder', icon: QUIZ_ICONS.folder, name, count: sheetCount, sheetId: null, folderId, sheetIds, tabs: [] };
    }

    // ---------- Quiz Mode ----------
    let quizWords = [];
    let quizIndex = 0;
    let quizRevealed = false;

    async function startQuiz() {
      const checked = [...document.querySelectorAll('#quizList input[type=checkbox]:checked')];
      if (checked.length === 0) { alert('Select at least one quiz'); return; }

      let words = [];
      for (const cb of checked) {
        const id = cb.dataset.id;
        if (id === 'my-words') {
          words = words.concat(JSON.parse(localStorage.getItem('myWords') || '[]'));
        } else {
          const quiz = getQuizzes().find(q => q.id === id);
          if (quiz) {
            const w = await fetchQuizWords(quiz);
            words = words.concat(w);
          }
        }
      }

      if (words.length === 0) { alert('No words found in selected quizzes'); return; }

      if (localStorage.getItem('quizShuffle') !== 'false') {
        for (let i = words.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [words[i], words[j]] = [words[j], words[i]];
        }
      }

      quizWords = words;
      quizIndex = 0;
      quizRevealed = false;
      showQuizWord();
      document.getElementById('quizOverlay').style.display = 'flex';
    }

    async function fetchQuizWords(quiz) {
      const token = await ensureAccessToken();
      if (quiz.type === 'folder') {
        let words = [];
        for (const id of (quiz.sheetIds || [])) {
          const meta = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}?fields=sheets.properties.title`, {
            headers: { Authorization: `Bearer ${token}` }
          }).then(r => r.json());
          for (const sheet of (meta.sheets || [])) {
            words = words.concat(await fetchSheetTabWords(id, sheet.properties.title, token));
          }
        }
        return words;
      }
      const tab = quiz.tabs && quiz.tabs[0] ? quiz.tabs[0] : 'Sheet1';
      return fetchSheetTabWords(quiz.sheetId, tab, token);
    }

    async function fetchSheetTabWords(sheetId, tabName, token) {
      // Read columns A (English) and B (Ukrainian) for every row in the tab
      const range = `'${tabName}'!A:B`;
      const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${encodeURIComponent(range)}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      const words = [];
      for (const row of (data.values || [])) {
        const en = row[0] || '';
        const uk = row[1] || '';
        if (en && uk) words.push({ en, uk });
      }
      return words;
    }

    function showQuizWord() {
      quizRevealed = false;
      document.getElementById('quizWord').textContent = quizWords[quizIndex].en;
      document.getElementById('quizTranslation').style.display = 'none';
      document.getElementById('quizTranslation').textContent = quizWords[quizIndex].uk;
      document.getElementById('quizProgress').textContent = `${quizIndex + 1} / ${quizWords.length}`;
    }

    document.getElementById('quizOverlay').addEventListener('click', e => {
      if (e.target.id === 'quizClose') return;

      if (!quizRevealed) {
        quizRevealed = true;
        document.getElementById('quizTranslation').style.display = 'block';
        return;
      }

      quizIndex++;
      if (quizIndex >= quizWords.length) {
        if (localStorage.getItem('quizLoop') === 'true') {
          quizIndex = 0;
        } else {
          closeQuiz(e);
          return;
        }
      }
      showQuizWord();
    });

    function closeQuiz(e) {
      e.stopPropagation();
      document.getElementById('quizOverlay').style.display = 'none';
    }
  </script>
</body>
</html>
